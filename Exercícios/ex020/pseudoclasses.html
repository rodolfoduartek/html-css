<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
</head>
<style>

    div{

        background-color: rgb(128, 143, 156);
        border: 2px solid black;  
        height: 200px;
        width: 200px;
        text-align: center;
        display: inline-block;
    }

    div:hover{
        background-color: aquamarine;
    }

</style>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
