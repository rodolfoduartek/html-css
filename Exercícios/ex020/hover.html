<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;

    }

    div > p {
        display: none;

    }


    div:hover > p { 
        display: block;
        color: rgb(232, 28, 28);
        background-color: rgb(11, 11, 20);
        width: 150px;
    }

</style>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse no texto abaixo</p>
    <div>Passe o mouse aqui
        <p>Texto escondido... </p>
    </div>
</body>
</html>
