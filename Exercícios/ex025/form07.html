<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form07</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iest">Estado</label>
            <select name="estado" id="iest">

                <option value="select">---Escolha---</option>
                <optgroup label="Sudesdete">
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="SP">São Paulo</option>
                </optgroup>

                <optgroup label="Nordeste">
                    <option value="CE">Ceará</option>
                    <option value="RN">Rio Grande Norte</option>
                    <option value="AL">Alagoas</option>
                </optgroup>
            </select>

       </p>
       <P>
            <label for="iprof">Profissão:</label>
            <input type="text" name="prof" id="iprof" list="lstprof"> 
            <datalist id="lstprof">
                    <option >Desenvolvedor</option>
                    <option >Médico</option>
                    <option >Engenheiro</option>
            </datalist>
       </P>
       <p>
            <label for="imsg">Mensagem:</label><br>
            <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>
       </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
